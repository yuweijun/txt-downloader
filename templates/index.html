<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Content Scraper</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="box">
  <form id="scrapeForm">
    <input type="text" name="filename" placeholder="Save as (e.g. book.txt)" value="{{ form.filename }}" required>
    <input type="url" name="url" placeholder="Target URL" value="{{ form.url }}" required>
    <input type="text" name="title_sel" value="{{ form.title_sel }}" placeholder="Title CSS Selector" required>
    <input type="text" name="content_sel" value="{{ form.content_sel }}" placeholder="Content CSS Selector" required>
    <button type="submit">Start Scraping</button>
  </form>
  <div id="result" style="margin-top:15px; font-weight:bold;"></div>
</div>
<div class="box">
  {% for file in files %}
  <div class="file-item">
    <a href="/txt-downloader/download/{{ file.name | urlencode }}">{{ file.name }}</a>
    <span class="time">{{ file.time_str }}</span>
    <button class="delete-btn" style="width: 60px;" onclick="deleteFile('{{ file.name | urlencode }}', '{{ file.name }}')">Delete</button>
  </div>
  {% else %}
  <p>No files yet.</p>
  {% endfor %}
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
